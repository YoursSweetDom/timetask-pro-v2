name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan for accidental secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan tracked source files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()

          excluded_prefixes = (
              ".git/",
              ".gradle/",
              ".idea/",
              "ai_workspace/",
              "app/build/",
              "build/",
          )
          excluded_suffixes = (
              ".png",
              ".jpg",
              ".jpeg",
              ".webp",
              ".gif",
              ".apk",
              ".aab",
              ".keystore",
              ".jks",
          )

          token_prefixes = ["sk-", "ghp_", "gho_", "ghu_", "ghs_", "ghr_", "github_pat_"]
          patterns = [
              ("OpenAI API key", re.compile(r"\b" + re.escape(token_prefixes[0]) + r"(?:proj-)?[A-Za-z0-9_-]{20,}\b")),
              ("GitHub token", re.compile(r"\b(?:" + "|".join(re.escape(prefix) for prefix in token_prefixes[1:]) + r")[A-Za-z0-9_]{20,}\b")),
              ("Google API key", re.compile(r"\bAIza[0-9A-Za-z_-]{30,}\b")),
              ("Private key block", re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----")),
          ]

          findings = []
          for file_name in tracked:
              normalized = file_name.replace("\\", "/")
              if normalized.startswith(excluded_prefixes) or normalized.lower().endswith(excluded_suffixes):
                  continue

              path = pathlib.Path(file_name)
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for line_number, line in enumerate(text.splitlines(), start=1):
                  for label, pattern in patterns:
                      if pattern.search(line):
                          findings.append(f"{file_name}:{line_number}: possible {label}")

          if findings:
              print("Potential secrets detected:")
              for finding in findings:
                  print(finding)
              sys.exit(1)

          print("No tracked secrets matched the configured patterns.")
          PY
