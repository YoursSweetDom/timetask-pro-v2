name: Feature request
description: Suggest a focused improvement for TimeTask Pro V2.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep feature requests focused on a concrete user workflow.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
      placeholder: When planning my day, I need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the app do?
      placeholder: Add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What other approaches did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Tasks
        - Sidebar
        - Notes
        - Calendar
        - Tools
        - Matrix
        - Templates
        - Settings
        - AI assistant
        - Build or infrastructure
        - Documentation
        - Other
    validations:
      required: true

