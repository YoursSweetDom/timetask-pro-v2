name: Bug report
description: Report a reproducible problem in TimeTask Pro V2.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for a maintainer to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The app crashes when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open...
        2. Tap...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version or commit
      placeholder: v0.1.0-alpha or commit hash
  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: Android 14, API 34
  - type: input
    id: device
    attributes:
      label: Device or emulator
      placeholder: Pixel 8 emulator
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or attach screenshots if useful. Remove private data first.
      render: text

